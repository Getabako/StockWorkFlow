name: Daily AI/IT Stock News Report

on:
  schedule:
    # 月曜日から金曜日 JST 6:00 (UTC 21:00) に実行
    - cron: '0 21 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch news data
        run: |
          python scripts/fetch_data.py
        env:
          TDNET_RSS_URL: ${{ secrets.TDNET_RSS_URL }}

      - name: Fetch stock prices
        run: |
          python scripts/fetch_stock_prices.py

      - name: Analyze and generate report
        run: |
          python scripts/analyze_report.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Set date variable
        if: success()
        run: |
          echo "REPORT_DATE=$(date +'%Y_%m_%d')" >> $GITHUB_ENV
          echo "Report date: $(date +'%Y_%m_%d')"

      - name: Convert report to HTML/PDF
        if: success()
        run: |
          python scripts/convert_report_to_html.py output/daily_report.md output/
          mv output/daily_report.html output/daily_report_${{ env.REPORT_DATE }}.html
          mv output/daily_report.pdf output/daily_report_${{ env.REPORT_DATE }}.pdf
          echo "✓ Renamed to daily_report_${{ env.REPORT_DATE }}.html/pdf"

      - name: Copy HTML report to report directory
        if: success()
        run: |
          mkdir -p report/daily
          cp output/daily_report_${{ env.REPORT_DATE }}.html report/daily/daily_report_${{ env.REPORT_DATE }}.html
          echo "✓ HTML report copied to report/daily/daily_report_${{ env.REPORT_DATE }}.html"

      - name: Convert report to YAML for SlideMovie
        if: success()
        run: |
          python scripts/convert_report_to_yaml.py output/daily_report.md inputs/ ${{ env.REPORT_DATE }}
          echo "✓ YAML file created for SlideMovie workflow"

      - name: Update workflow options with new YAML file
        if: success()
        run: |
          NEW_FILE="daily_report_${{ env.REPORT_DATE }}.yml"
          WORKFLOW_FILE=".github/workflows/1-generate-presentation.yml"

          # Check if the file is already in the options
          if ! grep -q "$NEW_FILE" "$WORKFLOW_FILE"; then
            # Add the new option after the last existing option
            sed -i "/- '知能検査ケーススタディ.yml'/a\\          - '$NEW_FILE'" "$WORKFLOW_FILE"
            echo "✓ Added $NEW_FILE to workflow options"
          else
            echo "✓ $NEW_FILE already exists in workflow options"
          fi

      - name: Commit and push reports
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add report/daily/daily_report_${{ env.REPORT_DATE }}.html
          git add inputs/daily_report_${{ env.REPORT_DATE }}.yml
          git add .github/workflows/1-generate-presentation.yml
          git diff --staged --quiet || git commit -m "Add daily report HTML and YAML for ${{ env.REPORT_DATE }} (automated)"
          git push origin main

      - name: Send report to Discord
        if: success()
        run: |
          python scripts/send_to_discord.py \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            "📊 AI/IT株式投資 日次レポート (${{ env.REPORT_DATE }})" \
            "output/daily_report.md" \
            "3066993" \
            "output/daily_report_${{ env.REPORT_DATE }}.pdf"

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ env.REPORT_DATE }}
          path: |
            output/articles.json
            output/stock_prices.json
            output/daily_report.md
            output/daily_report_${{ env.REPORT_DATE }}.html
            output/daily_report_${{ env.REPORT_DATE }}.pdf
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          python -c "
          import requests, json
          from datetime import datetime
          requests.post('${{ secrets.DISCORD_WEBHOOK_URL }}', json={
            'embeds': [{
              'title': '⚠️ 日次レポート生成エラー',
              'description': '日次レポートの生成中にエラーが発生しました。GitHub Actionsのログを確認してください。',
              'color': 15158332,
              'timestamp': datetime.utcnow().isoformat()
            }]
          })
          "

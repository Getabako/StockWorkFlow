name: Daily AI/IT Stock News Report

on:
  schedule:
    # 毎日 JST 6:00 (UTC 21:00) に実行
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch news data
        run: |
          python scripts/fetch_data.py
        env:
          TDNET_RSS_URL: ${{ secrets.TDNET_RSS_URL }}

      - name: Analyze and generate report
        run: |
          python scripts/analyze_report.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Convert report to HTML/PDF
        if: success()
        run: |
          python scripts/convert_report_to_html.py output/daily_report.md

      - name: Copy HTML report to report directory
        if: success()
        run: |
          mkdir -p report
          cp output/daily_report.html report/daily_report.html
          echo "✓ HTML report copied to report/"

      - name: Commit and push HTML report
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add report/daily_report.html
          git diff --staged --quiet || git commit -m "Update daily report HTML (automated)"
          git push

      - name: Send report to Discord
        if: success()
        run: |
          python scripts/send_to_discord.py \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            "📊 AI/IT株式投資 日次レポート" \
            "output/daily_report.md" \
            "3066993"

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: |
            output/articles.json
            output/daily_report.md
            output/daily_report.html
            output/daily_report.pdf
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          python -c "
          import requests, json
          from datetime import datetime
          requests.post('${{ secrets.DISCORD_WEBHOOK_URL }}', json={
            'embeds': [{
              'title': '⚠️ 日次レポート生成エラー',
              'description': '日次レポートの生成中にエラーが発生しました。GitHub Actionsのログを確認してください。',
              'color': 15158332,
              'timestamp': datetime.utcnow().isoformat()
            }]
          })
          "

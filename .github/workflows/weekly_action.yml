name: Weekly Portfolio Action Plan

on:
  schedule:
    # 毎週金曜日 JST 20:00 (UTC 11:00) に実行
    - cron: '0 11 * * 5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  weekly-action:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update portfolio evaluation
        run: |
          python scripts/update_portfolio.py
        env:
          STOCK_API_KEY: ${{ secrets.STOCK_API_KEY }}

      - name: Generate action plan
        run: |
          python scripts/generate_action.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Send action report to Discord
        if: success()
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          curl -H "Content-Type: multipart/form-data" \
               -F "payload_json={\"embeds\":[{\"title\":\"💰 AI/IT株式投資 週次アクションレポート\",\"description\":\"今週の推奨売買アクションと定期買い付けリマインド\",\"color\":15844367,\"timestamp\":\"$TIMESTAMP\"}]}" \
               -F "file=@output/weekly_action_report.md" \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-action-${{ github.run_number }}
          path: |
            output/portfolio_summary.csv
            output/weekly_action_report.md
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          curl -H "Content-Type: application/json" \
               -d "{\"embeds\":[{\"title\":\"⚠️ 週次アクションレポート生成エラー\",\"description\":\"週次レポートの生成中にエラーが発生しました。GitHub Actionsのログを確認してください。\",\"color\":15158332,\"timestamp\":\"$TIMESTAMP\"}]}" \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"

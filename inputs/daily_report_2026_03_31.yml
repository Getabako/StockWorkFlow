- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/03/31のAI・IT株式ニュースをお届けします。
- slide: 2
  script: 本日のテクノロジーセクターは、AI分野がOpenAIによる過去最大の資金調達（1220億ドル）で市場の期待感を高め、NVIDIAもMarvell
    Technologyへの戦略的投資でAIエコシステムの深化を図っています。ロボティクス、医療テック、宇宙産業も活発な資金調達と新技術開発が続き、特に防衛分野での自律システム需要が顕著です。一方、EV市場ではTeslaの自動運転領域拡大とGMの生産調整が同時に報じられ、成長痛と競争激化の兆候が見られます。
- slide: 3
  script: NVIDIAによるMarvell Technologyへの20億ドル投資。AIチップとネットワーキング機器のプラットフォーム統合を目的とした戦略的投資が行われました。（記事9）
- slide: 4
  script: AbbottがWhoopの戦略的投資家として参画。ウェアラブルヘルス企業Whoopの5.75億ドル資金調達ラウンドにAbbottが参加しました。（記事41）
- slide: 5
  script: Intercontinental Exchange (ICE) がOKXに2億ドル投資。NYSEの親会社であるICEが暗号通貨取引所OKXに投資し、OKXの評価額は250億ドルに達しました。（記事23）
- slide: 6
  script: NVIDIAとMarvell TechnologyのAIプラットフォーム統合提携。NVIDIAがMarvellのカスタムAIチップとネットワーキング機器を自社プラットフォームに統合することを許可する提携を発表しました。（記事9）
- slide: 7
  script: RivianスピンオフのAlsoとDoorDashの自律配送提携。電動バイクスタートアップのAlso（Rivianのスピンオフ）がDoorDashと提携し、自律配送ソリューション開発に着手します。（記事20）
- slide: 8
  script: 本日のAI・IT株式ニュースは以上です。

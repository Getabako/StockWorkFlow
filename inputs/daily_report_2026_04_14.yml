script_notes:
- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/04/14のAI・IT株式ニュースをお届けします。
- slide: 2
  script: 本日のテクノロジー市場は、AI、宇宙、EV・自動運転の各分野で目覚ましい動きを見せました。AI分野では、Google DeepMindによるロボットの推論能力強化や、AnthropicとOpenAIによるサイバーセキュリティ向けAIモデルの競争が活発化する一方で、AIのリスクに対する国際的な規制強化の議論が活発化しています。宇宙産業では、AmazonによるGlobalstarの116億ドル買収が発表され、衛星通信市場の競争激化と商用化の加速を強く印象付けました。EV市場では、世界販売台数の成長鈍化が見られるものの、充電インフラの拡充、バッテリー技術の革新、新型EVの投入、そして戦略的パートナーシップが引き続き市場を牽引しています。
- slide: 3
  script: AmazonによるGlobalstar買収。Amazonが衛星通信事業者Globalstarを約116億ドルで買収することを発表。これにより、衛星直接通信サービス市場への本格参入を果たし、Elon
    Musk氏のStarlinkとの競争が激化すると見られます。Appleの衛星事業にも間接的に影響を与える可能性があります。（記事13, 17, 19, 32,
    35, 59）
- slide: 4
  script: MetaとBroadcomのカスタムAIチップ開発深化。Meta PlatformsはBroadcomとの提携を拡大し、同社のAIサービスを強化するためのカスタムチップの設計・製造を深化させると発表しました。（記事14）
- slide: 5
  script: Google DeepMindとBoston Dynamicsの協業。Google DeepMindは、Gemini Robotics ER-1.6を活用してBoston
    DynamicsのSpotロボットの推論能力と環境理解能力を向上させると発表。AIとロボットの統合による自律性の強化が加速しています。（記事3, 38, 39）
- slide: 6
  script: Google.orgとJohnson & Johnson Foundationの医療AI教育イニシアチブ。Google.orgとJohnson
    & Johnson Foundationは、米国の農村地域の医療従事者向けにAIトレーニングを提供するため、1,000万ドルのイニシアチブを立ち上げました。（記事7）
- slide: 7
  script: SESとBoeingの航空機向け衛星通信統合。SESとBoeingは、航空機生産プロセス中に多軌道型機内接続ハードウェアを工場で統合する契約を発表し、衛星通信の設置方法における重要な転換点を示しました。（記事45）
- slide: 8
  script: 本日のAI・IT株式ニュースは以上です。
- slide: 9
  script: ご視聴いただきありがとうございました。実はこのレポート、if塾の塾頭高崎による「完全自動化への挑戦」プロジェクトの一環として、AIが自動生成しています。将来的には塾頭が執筆しているような自然な記事になることを目指しており、現時点では事実と異なる内容が含まれる可能性もあります。この挑戦に共感していただけたら、ぜひチャンネル登録とグッドボタンをよろしくお願いします！また、無料のAI教育や導入コンサルも受け付けています。詳しくは概要欄のリンクからお問い合わせください。

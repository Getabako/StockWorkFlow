script_notes:
- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/02/25のAI・IT株式ニュースをお届けします。
- slide: 2
  script: AI/IT業界は、GoogleがAIの製品統合（検索、Android、ロボティクス）を加速する一方、AMDはNutanixとの戦略的提携やMetaからの大型受注観測により、ハードウェア市場におけるNVIDIA以外の選択肢としての存在感を強めています。市場全体ではAIへの期待は根強いものの、ウォールストリートではAIブームの持続性やバブルの可能性に対する不確実性が高まっており、NVIDIAの決算発表が今後の市場センチメントを大きく左右すると注目されています。
- slide: 3
  script: GoogleによるIntrinsic統合。Alphabet傘下の物理AI・ロボティクス企業IntrinsicがGoogleに統合されました。これはGoogleが物理AI分野への注力を加速させる動きと見られます。(記事1)
- slide: 4
  script: StripeによるPayPalへの買収関心。決済大手Stripeが、競合であるPayPal Holdingsの全部または一部の買収に関心を示していると報じられました。(記事23,
    29)
- slide: 5
  script: AMDとNutanixの提携強化。Advanced Micro Devices (AMD) がNutanix Inc.の株式1億5,000万ドル分を取得し、共同エンジニアリングおよび販売努力を含む新たな戦略的パートナーシップを締結しました。これはAMDがデータセンターインフラ市場でのプレゼンスを強化する動きであり、OpenAIのNVIDIA依存脱却戦略（AMDとの大型契約）とも符合する可能性があります。(記事11)
- slide: 6
  script: ArmのCoreCollective発表。ArmはLinaroと協力し、Armソフトウェアエコシステムのオープンなコラボレーション、標準化、イノベーションを推進する「CoreCollective」を発表しました。これは、Armがエコシステム全体の活性化を通じて、ロボット組み込みシステムなどAI関連分野での影響力拡大を目指すものと考えられます。(記事8)
- slide: 7
  script: MetaのAMD製ハードウェアへの投資報道。MetaがAMDの設備に数十億ドルを投じる予定であると報じられました。これは、AI開発競争においてNVIDIA以外のチップメーカーへの需要が高まっていることを示唆し、AMDの成長を加速させる可能性があります。(記事23)
- slide: 8
  script: 本日のAI・IT株式ニュースは以上です。

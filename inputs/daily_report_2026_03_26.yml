  script: 今日のテクノロジーセクターは、AI分野における主要プレイヤー間の競争激化と多角化が顕著です。GoogleはGeminiの機能強化と競合からの移行ツールを発表し、AppleはSiriのオープン化でAIプラットフォーム戦略を加速。AIインフラへの大規模投資が続く一方、ロボティクスやEV市場でも新製品や新技術の投入、地理的拡大が進んでいます。地政学的リスクや新たな規制の動きも市場に影響を与えています。
- slide: 3
  script: Agile RobotsとGoogle DeepMind。Agile RobotsはGoogle DeepMindの基盤モデルを人型ロボットに展開する提携を発表しました。これは、AIとロボティクスの統合による高付加価値な産業用途での活用を目指す動きです。（記事41）
- slide: 4
  script: AppleのSiriオープン化。AppleはiOS 27アップデートでSiriを競合のAIアシスタントに開放する計画を発表しました。これにより、iPhoneがより広範なAIプラットフォームとして機能することが期待されます。（記事13）
- slide: 5
  script: VolkswagenとXPeng。Volkswagenは、中国市場向けにXPengと共同開発した電気自動車SUV「ID.UNYX 08」の先行予約を開始しました。（記事58）
- slide: 6
  script: Aligned Data Centersの信用枠確保。Aligned Data Centersは、米国内でのデータセンター拡張資金として25.8億ドルの信用枠を確保しました。AI需要拡大に伴うインフラ投資の活発化を示唆します。（記事38）
- slide: 7
  script: Metaのデータセンター投資増額。Meta Platformsは、テキサス州エルパソのデータセンターへの投資額を100億ドル以上に増額すると発表しました。同社のAI戦略を支えるインフラ整備への大規模なコミットメントです。（記事21）

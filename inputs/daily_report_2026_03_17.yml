  script: GoogleとAMPのCO2削減提携。GoogleはAMPと協力し、2030年までに20万トンのCO2削減を目指すパートナーシップを発表しました。（記事8）
- slide: 7
  script: NebiusとNVIDIAの物理AIクラウド提携。NebiusはNVIDIAのPhysical AI Data Factory Blueprintをグローバル規模のAIインフラに統合するためにNVIDIAと提携しました。これはAIとロボティクスの融合を加速する動きを示唆しています。（記事42）

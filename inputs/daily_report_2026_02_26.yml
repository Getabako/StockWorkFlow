script_notes:
- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/02/26のAI・IT株式ニュースをお届けします。
- slide: 2
  script: 本日のAI/IT市場は、Googleが画像生成AI「Nano Banana 2」の発表や既存製品へのGemini統合、AIトレーニング提携など、広範なAIエコシステム強化を継続しました。一方で、AIインフラの雄NVIDIAは市場の期待を下回る見通しで株価が下落し、AIバブルへの懸念が再燃。Anthropicと米国防総省のAI倫理を巡る対立が深刻化するなど、AIの社会実装における規制・倫理問題が顕在化しています。DellのAIサーバー販売予測好調やSnowflake・SalesforceのAI統合による業績改善は、特定の分野でのAI需要と収益化の成功を示しています。
- slide: 3
  script: Blockの人員削減とAIへの賭け。Jack Dorsey率いるBlock社が、AIへの戦略的転換を図るため従業員の約半分（4,000人）を削減することを発表しました。これはM&Aではありませんが、AIによる労働生産性向上と事業再編の動きとして注目されます。（記事11）
- slide: 4
  script: Salesforceの大規模自社株買い。Salesforceは長期売上高の力強い見通しと、500億ドル規模の新たな自社株買いプログラムを発表しました。これはAIディスラプションへの市場の懸念を払拭し、株主価値を向上させるための戦略的な財務施策です。（記事28）
- slide: 5
  script: GoogleとマサチューセッツAI Hubの提携。Googleはマサチューセッツ州のAI Hubと提携し、州民に無償のAIトレーニングを提供する新たなイニシアチブを開始しました。これはAI人材育成とエコシステム強化に向けたGoogleの取り組みを示しています。（記事2）
- slide: 6
  script: Anthropicと米国防総省の対立。Anthropicと米国防総省の間で、AIの利用における「ガードレール」（倫理的制限）を巡る対立が深刻化しています。国防総省はAnthropicを軍のサプライチェーンから排除する可能性を示唆しており、AIの倫理的利用や安全保障に関する規制・政策の方向性に大きな影響を与える可能性があります。（記事18,
    19）
- slide: 7
  script: DellのAIサーバー売上見通し。Dell Technologiesは、AIサーバーの売上高が500億ドルに達するとの見通しを発表し、株価が急騰しました。これは、AIデータセンター構築に向けたインフラ需要の爆発的な増加を明確に示しており、サプライヤーにとっての巨大なビジネス機会を浮き彫りにしています。（記事10）
- slide: 8
  script: 本日のAI・IT株式ニュースは以上です。

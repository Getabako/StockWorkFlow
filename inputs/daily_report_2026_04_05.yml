- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/04/05のAI・IT株式ニュースをお届けします。
- slide: 2
  script: 本日は、AI需要の持続的な堅調さがNVIDIAパートナーの業績（Hon Hai）によって裏付けられ、AIエコシステムの健全性が示されました。IBMはAIをエンターテイメント分野に応用する新たなパートナーシップを発表し、AIの応用範囲の広がりを示しています。宇宙産業ではNASAの予算削減と計画中止が報じられる一方、Artemis
    IIミッションは順調に進展しており、官民のバランスが注目されます。EV市場ではVinFastがインドの電動二輪車市場への参入を準備するなど、新興市場での競争が激化しています。
- slide: 3
  script: IBMとマスターズゴルフがAIで提携。IBMとマスターズゴルフが協力し、AIを活用してファンに革新的な体験を提供することを発表しました。これはAIがエンターテイメント産業へ深く浸透する動きを示しています。（記事4）
- slide: 4
  script: IBMのAIエンタメ応用。IBMがマスターズゴルフとの提携を通じて、AIをゴルフ中継やファン体験向上に活用する新技術を発表しました。（記事4）
- slide: 5
  script: NORD Drivesystemsが鉱業向け産業用ギアユニットを発表。NORD Drivesystemsは、鉱業向けに高い剛性と漏れ防止機能を備えたMAXXDRIVEシリーズの産業用ギアユニットを発売しました。（記事7）
- slide: 6
  script: ロボットと人間のインタラクション研究。次世代ロボットの家庭、オフィス、工場への統合を成功させるには、ハードウェア・ソフトウェア問題だけでなく、人間がロボットをどのように認識し、効果的に協働できるかを理解することが重要であるとの研究が紹介されました。（記事6）
- slide: 7
  script: VinFastの電動スクーター展開。VinFastがインド市場向けに電動スクーターのラインナップを準備しています。（記事12）

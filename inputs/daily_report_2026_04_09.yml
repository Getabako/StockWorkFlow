script_notes:
- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/04/09のAI・IT株式ニュースをお届けします。
- slide: 2
  script: 本日のテクノロジーセクターでは、AIコンピューティング資源を巡る競争が激化し、CoreWeaveとMetaの間で210億ドルの大型契約が締結されました。GoogleとIntelの協業深化やAmazonのAIチップ販売検討は、NVIDIA一強体制への対抗軸を明確にしています。ロボティクス分野ではKiaの工場導入やAGIBOTのEmbodied
    AIモデル発表が進み、宇宙産業では商用・国防向け衛星プログラムへの投資が活発化。EV市場ではTeslaの中国販売減やVWの戦略転換が見られる一方で、充電インフラ拡充やSDVの導入など、多岐にわたる変革の動きが報じられています。
- slide: 3
  script: GoogleとIntelの協業深化。GoogleはデータセンターでIntel Xeonプロセッサの将来世代とカスタムIPUの利用を継続するとコミットし、AIインフラにおける長期的なパートナーシップを強化しました
    (記事4, 27)。
- slide: 4
  script: CoreWeaveとMetaのAIコンピューティング供給契約。CoreWeaveはMeta Platformsに対し、2032年まで210億ドル規模のAIコンピューティングパワーを提供する大型契約を締結し、MetaのAIモデル開発を支援します
    (記事15, 26, 33)。
- slide: 5
  script: BYDとKFCの提携。BYDがファストフードチェーンKFCと提携し、9分で充電可能なEV充電サービスステーションを共同で展開します (記事63)。
- slide: 6
  script: CoreWeaveとMetaの210億ドル契約。Meta PlatformsへのAIコンピューティングパワー提供に関する大規模契約が締結されました
    (記事15, 26, 33)。
- slide: 7
  script: Space ForceのGEO監視プログラム向け18億ドル契約。米宇宙軍が14社を対象に、静止軌道（GEO）監視プログラム向けに18億ドルの契約を締結しました。これには「ネイバーフッドウォッチ」衛星の開発が含まれます
    (記事48)。
- slide: 8
  script: 本日のAI・IT株式ニュースは以上です。

    Wave Globalの過半数株式を取得。AI・宇宙セクターへの大規模な投資流入を示唆します。(記事 21)
- slide: 6
  script: Voyager TechnologiesがMax Spaceに投資。Voyager TechnologiesがMax Spaceに投資し、月面居住地開発における両社のパートナーシップを加速させます。(記事
    39)
- slide: 7
  script: OracleとOpenAIがデータセンター拡張計画を中止。OracleとOpenAIはテキサス州での主要データセンター拡張計画を中止しました。これはOpenAIのインフラ戦略における変更、あるいは地政学的・規制リスクの影響を示唆する可能性があります。(記事

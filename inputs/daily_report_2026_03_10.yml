- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/03/10のAI・IT株式ニュースをお届けします。
- slide: 2
  script: AIセクターでは、エッジAIの進化と生成AIアプリの多様化が進行する一方で、OpenAIを巡るデータセンター提携の見直しや幹部の辞任など、インフラ投資戦略と倫理・軍事利用に関する課題が顕在化しています。ロボティクス・自動運転分野では、商用自動運転トラックやロボタクシーの展開が加速するものの、Tesla
    FSDの安全性問題が規制強化を促しています。宇宙産業は民間投資による月面開発や衛星製造が活発化し、EV市場では充電インフラの競争と多様なモデル投入が進展しています。
- slide: 3
  script: OpenAIがAIセキュリティスタートアップPromptfooを買収。大企業顧客がAIソフトウェア展開時に直面するセキュリティリスクを低減するため、開発中のAIモデルのセキュリティ問題を発見・修正するスタートアップPromptfooの買収に合意しました。(記事16)
- slide: 4
  script: AgilentがBiocare Medicalを9億5000万ドルで買収。免疫組織化学分野での成長が著しいBiocare Medicalを買収し、Agilentのin
    vitro診断抗体開発能力を強化する見込みです。(記事34)
- slide: 5
  script: OracleとOpenAIがデータセンター拡張計画を中止。テキサス州における主力データセンターの拡張計画を中止することが発表されました。(記事9)
- slide: 6
  script: ABBがNVIDIA Omniverseライブラリを活用しRobotStudioを強化。産業用ロボットのシミュレーター「RobotStudio
    HyperReality」にNVIDIA Omniverseライブラリを統合し、2026年下半期に提供開始予定です。これにより、ロボット開発・導入の効率化が期待されます。(記事32)
- slide: 7
  script: Mercedes-Benzが南アフリカ工場を中国のGreat Wall Motorと共有検討。米国の貿易関税に対処するため、メルセデス・ベンツが南アフリカの製造工場を中国のGreat
    Wall Motorと共有する可能性を検討しています。(記事19)
- slide: 8
  script: 本日のAI・IT株式ニュースは以上です。

- slide: 2
  script: AIセクターは、OpenAIへの巨額資金流入と評価額高騰が続く一方で、投資家による競合Anthropicへの選別意識も浮上しています。AIインフラの基盤となるデータセンターおよびその電力供給への大規模投資が活発化。宇宙産業ではSpaceXがIPOに向けて動き出し、商業化と有人探査が加速しています。EV・自動運転分野では各社から新モデルが続々登場し、競争激化とインフラ整備が進む中で、自動運転技術の進化も止まりません。ロボティクスはAIとの融合により、新たな実用化フェーズに入りつつあります。
- slide: 3
  script: Intel。は、アイルランドの半導体製造工場におけるジョイントベンチャーの株式49%を$142億ドルで買い戻すことで合意しました（記事7, 13）。これは、半導体製造能力の自社コントロール強化に向けた同社の戦略的動きを示しています。
- slide: 4
  script: Teledyne。は、高まる需要に対応するため、専用の宇宙部門を新設しました（記事46）。既存事業の再編を通じて宇宙産業へのコミットメントを強化する動きです。
- slide: 5
  script: Morgan Stanley。は、AIブームがM&A市場の形成に影響を与えていると指摘しました（記事9, 15）。
- slide: 6
  script: Google.org。は、Highlights for Childrenとの既存の協業を拡大し、100万人の学生にデジタル世界のナビゲートを支援しました（記事1）。
- slide: 7
  script: Google。はブラジル政府と提携し、衛星画像AIを活用した森林保護マップを開発しました（記事3）。AIの社会貢献および環境テック分野への応用を示します。

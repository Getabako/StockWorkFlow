script_notes:
- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/04/16のAI・IT株式ニュースをお届けします。
- slide: 2
  script: 今日のテクノロジーセクターは、AIが創薬、サイバーセキュリティ、ホワイトカラー業務代替、Webブラウジングなど多様な分野で急速に進化しており、OpenAIとAnthropicが新モデルを相次いで発表し競争が激化しています。半導体分野では、イーロン・マスクがTesla/SpaceXのTerafab計画でサプライヤーに協力を要請し、Intelもファウンドリー事業強化に動くなど、チップ生産の内製化・強化の動きが顕著です。ロボティクスは製造業での導入が進み、宇宙産業は商業化と国際協力が加速。EV市場は低価格モデルが成功を収める一方、テスラは訴訟リスクや販売戦略で課題を抱えています。
- slide: 3
  script: Skild AIがFetch Roboticsの資産を買収。Skild AIがZebra Technologiesのロボティクス部門であるFetch
    Roboticsの資産を買収し、倉庫の自動化ソリューションを強化すると発表しました。（記事37）
- slide: 4
  script: AbbottがExact Sciencesの買収後に業績予想を下方修正。Abbott LaboratoriesがExact Sciencesを210億ドルで買収した後、今期の業績予想を下方修正しました。CEOは買収の文化的な適合性と大腸がん検査の需要増加に期待を表明しています。（記事39）
- slide: 5
  script: Googleが企業リーダー向けAI変革サミットを開催。Googleは、Fortune 500企業のリーダーを対象に「Leading the AI
    Transformation summit」を開催し、職場でのAI導入を推進するための情報交換を行いました。（記事5）
- slide: 6
  script: MuskがTerafab計画でチップメーカーに協力を要請。Elon Musk率いるTeslaとSpaceXの共同ベンチャーが、最先端チップ生産を目指す「Terafab」計画のため、Applied
    Materials、Tokyo Electron、Lam Researchなどのチップ産業サプライヤーに価格見積もりと納期を打診しています。（記事12, 22）
- slide: 7
  script: ホワイトハウスが政府機関にAnthropic Mythos AIを提供準備。米政府は、強力なAIモデルであるAnthropic PBCの「Mythos」を主要な連邦機関が利用できるよう準備を進めていますが、同時にサイバーセキュリティリスクへの懸念も示されています。（記事33）
- slide: 8
  script: 本日のAI・IT株式ニュースは以上です。
- slide: 9
  script: ご視聴いただきありがとうございました。実はこのレポート、if塾の塾頭高崎による「完全自動化への挑戦」プロジェクトの一環として、AIが自動生成しています。将来的には塾頭が執筆しているような自然な記事になることを目指しており、現時点では事実と異なる内容が含まれる可能性もあります。この挑戦に共感していただけたら、ぜひチャンネル登録とグッドボタンをよろしくお願いします！また、無料のAI教育や導入コンサルも受け付けています。詳しくは概要欄のリンクからお問い合わせください。

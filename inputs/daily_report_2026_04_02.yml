  script: AI分野ではGoogleがオープンモデル「Gemma 4」やAI動画作成ツール「Google Vids」を発表し、OpenAIはメディア企業買収でAI議論を主導。Microsoftも独自AIモデル開発を加速させるなど、競争が激化しています。AI導入に伴いテクノロジー業界での雇用削減が顕著です。ロボティクス分野ではヒューマノイドや生体ロボット、特殊環境対応AI連携技術が進展。宇宙産業ではNASAの有人月面ミッション「Artemis
    II」が打ち上げられ、関連企業の技術貢献やIPO期待が高まっています。EV市場ではTeslaが販売目標未達で苦戦する一方、ToyotaがFordを上回るなど、競争環境に変化が見られます。
- slide: 3
  script: OpenAIがTech Talk Show TBPNを買収。AI業界での議論を主導する目的で、メディア企業を買収するという異例の動きを見せた。（Bloomberg
    Technology, 記事15）

script_notes:
- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/03/05のAI・IT株式ニュースをお届けします。
- slide: 2
  script: 今日のAI/IT市場は、主要プレイヤー間の競争激化と、AI技術の幅広い産業への浸透が加速している。OpenAIは金融サービス市場に参入しAnthropicと競合する一方、AIチップ市場ではBroadcomがNvidiaに挑戦し、米国政府は半導体輸出規制を強化する動きを見せている。AI投資の巨大なコストが企業の財務に影響を与える一方で、製造業やヘルスケアなど多岐にわたる分野でAI活用が進み、市場全体の構造変革が進行している。
- slide: 3
  script: NetflixがAI映画制作企業を買収。Netflix Inc.が、俳優ベン・アフレックが4年前に設立したAI映画制作技術企業InterPositiveを買収した。（記事28）
- slide: 4
  script: Ouraがジェスチャー認識スタートアップを買収。スマートリングメーカーのOura Health Oyがジェスチャー認識スタートアップを買収し、スマートリングに新たな操作機能を導入する計画。（記事30）
- slide: 5
  script: CVS HealthとGoogle Cloudの提携。CVS HealthがGoogle Cloudと提携し、AIを活用したヘルスケアプラットフォーム「Health100」を立ち上げた。これは消費者向けに医療へのワンストップアクセスを提供する。（記事6）
- slide: 6
  script: Anthropicと米国防総省の協議再開。Anthropicと米国防総省は、同社のAIモデルの軍事利用に関する対立の後、協議を再開した。国防総省はAnthropicをサプライチェーンリスクと見なす旨を正式に通知している。（記事7,
    16, 29）
- slide: 7
  script: AI製造ユニコーンへの大型投資。Founders Fundが、産業ソフトウェアスタートアップNominalのシリーズB拡張ラウンドを主導し、8000万ドルを投資。これによりNominalの評価額は10億ドルに達した。（記事9,
    34）
- slide: 8
  script: 本日のAI・IT株式ニュースは以上です。

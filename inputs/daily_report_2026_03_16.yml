- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/03/16のAI・IT株式ニュースをお届けします。
- slide: 2
  script: AIチップとインフラへの巨額投資が市場を牽引しており、NVIDIAは2027年までにAIチップで1兆ドルの売上を見込み、MetaはAIインフラに最大270億ドルを投資する契約を締結しました。OpenAIは企業向けAI市場拡大に向けた戦略的提携を模索し、AIエコシステムの成熟を示唆しています。ロボティクス、医療テック、EV、宇宙産業など多様なセクターでAIと自動化技術の応用が加速しており、各分野で新製品や技術革新が発表されていますが、一部に課題や地政学リスクも存在します。
- slide: 3
  script: AppleによるMotionVFX買収。AppleはFinal Cut Pro向けプラグイン開発企業MotionVFXを買収し、クリエイター向けサブスクリプション事業の強化を図ります。(記事20)
- slide: 4
  script: Ant GroupによるBright Smart Securities買収承認。Ant Groupは香港証券会社のBright Smart Securitiesの買収について、中国当局の承認を得ました。(記事24)
- slide: 5
  script: OpenAIがPEファームと100億ドル規模のJV交渉。OpenAIはTPG、Brookfield、Bain Capitalなどのプライベートエクイティファームと、AIソフトウェアの企業導入促進を目的とした100億ドル規模の合弁事業設立に向けた交渉を進めています。(記事14,
    19)
- slide: 6
  script: MetaがNebiusとAIコンピューティング契約を拡大。Meta PlatformsはNebius GroupのAIインフラに対し、今後5年間で最大270億ドルを支出する契約を拡大しました。(記事14,
    26)
- slide: 7
  script: ArmとSumo Digitalの協業。Armはゲーム開発会社Sumo Digitalと協力し、PCクラスのゲーム体験をモバイルデバイスにもたらす取り組みを発表しました。(記事5)
- slide: 8

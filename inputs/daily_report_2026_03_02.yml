- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/03/02のAI・IT株式ニュースをお届けします。
- slide: 2
  script: AI市場は引き続き活況を呈しており、特にAIコーディングアシスタントCursorや中国のMiniMaxなど、一部のスタートアップは驚異的な成長を記録しています。NVIDIAはAIインフラへの大規模投資を継続し、エコシステムを強化。一方で、Anthropicのサービスが需要過多で停止したり、政府によるブラックリスト化の動きがあったりと、急速な成長に伴う課題や地政学的リスクが浮上しています。各業界でAIの統合が進み、企業は組織再編や戦略的提携を通じて対応しています。
- slide: 3
  script: ArmとDanantara Indonesiaの戦略的提携。インドネシアにおけるAIおよび半導体イノベーションを促進するため、Arm Total
    Compute Solutionsを基盤としたパートナーシップを締結しました。（記事3）
- slide: 4
  script: MWC 2026におけるモバイル業界の連携。モバイル業界は、AI主導のイノベーションと新たなパートナーシップを通じて、サプライチェーンの課題や地政学的リスクを克服しようと模索しています。（記事26）
- slide: 5
  script: NVIDIAのデータセンター光学部品企業への40億ドル投資。AIインフラシステムの育成を目的として、データセンター光学部品を開発する2社に40億ドルを投資することを合意しました。これはNVIDIAがAI経済圏のハードウェア支配者としての地位をさらに固める動きです。（記事14）
- slide: 6
  script: NVIDIA出資のAIスタートアップFirmusによるデータセンター契約。Nvidiaが出資するオーストラリアのAIスタートアップFirmus
    Technologiesが、IPOを控える中で新たなデータセンター契約を締結しました。これはNVIDIAがベンチャーキャピタルのように機能し、AIエコシステムを構築していることを示唆します。（記事34）
- slide: 7
  script: Google AIを活用したVRC Non-Skip広告の提供開始。Google/Alphabetは、Google AIを利用したVRC Non-Skip広告をグローバルで提供開始し、ブランドがTV視聴者層にリーチできる新たな手段を提供します。（記事1）

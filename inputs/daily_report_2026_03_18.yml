script_notes:
- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2026/03/18のAI・IT株式ニュースをお届けします。
- slide: 2
  script: AIブームは半導体（メモリチップ）やデータセンターといった基盤インフラへの投資を劇的に加速させています。NVIDIAはロボティクスを含む「物理AI」分野での提携を強化し、AIエコシステムの中核としての地位を不動のものとしています。AIの社会実装が進む中で、その倫理的側面（EUのAI規制）や既存産業へのディスラプション（ソフトウェア分野の再編、金融取引への影響）も顕在化しており、市場は期待と懸念が入り混じった状態です。EV市場では多様な新製品投入と販売モデルの規制緩和が進み、宇宙産業は商業プレイヤーとの連携を深め、利用範囲を拡大しています。
- slide: 3
  script: Qualtricsの債務取引停止。JPMorgan Chaseを中心とする銀行団が、ソフトウェア企業Qualtrics Internationalの53億ドルの債務取引を停止しました。背景には、AIによるディスラプションへの不安が深まっていることがあります。(記事8)
- slide: 4
  script: JenaValveの買収中止。Edwards LifesciencesによるJenaValveの9億4500万ドルでの買収計画が、連邦取引委員会（FTC）の反対により2ヶ月前に中止されたことが言及されています。(記事38)
- slide: 5
  script: NVIDIAとロボティクスリーダーの協業。NVIDIAは世界のロボティクスリーダー企業と提携し、「物理AI（Physical AI）」の実現に向けた取り組みを加速しています。(記事33)
- slide: 6
  script: AdvantechとNVIDIA Jetson Thor。AdvantechはNVIDIA Jetson Thorを利用し、ロボティクス、医療AI、産業エッジ向け製品のエコシステム開発を推進しています。(記事36)
- slide: 7
  script: 商業宇宙プレイヤーとの連携。米宇宙軍が主催する機密演習に25社の商業プレイヤーが参加し、宇宙空間における商業と軍事の連携が強化されています。(記事42)
- slide: 8
  script: 本日のAI・IT株式ニュースは以上です。
- slide: 9

- slide: 1
  script: うぃっすー！if塾AIニュースのお時間です。2025/11/23のAI・IT株式ニュースをお届けします。
- slide: 2
  script: 本日のAI/IT市場では、アラブ首長国連邦（UAE）がアフリカのAIインフラに10億ドルを投資する計画を発表し、AI技術のグローバルな地理的拡大と新興市場への注目の高まりが鮮明になりました。一方で、ハーバード大学のデータベースがサイバー攻撃を受けるなど、ITセキュリティの脅威が継続しており、AIシステムを含むインフラ全体の防御強化が引き続き重要な課題です。M&A、新製品、業績に関する直接的な発表はありませんでした。
- slide: 3
  script: UAE、アフリカのAIインフラに10億ドル投資計画。アラブ首長国連邦は、アフリカ全土における人工知能インフラおよびサービスを拡大するため、10億ドルの投資を計画していることを発表しました。この動きは、AI技術の未開拓市場であるアフリカ大陸での影響力強化と、技術普及の加速を目指すものであり、アフリカ諸国政府や現地企業、グローバルAIソリューションプロバイダーとの戦略的パートナーシップ構築の基盤となるでしょう。
- slide: 4
  script: UAE、アフリカのAI市場へ大規模投資。上記のUAEによる10億ドルの投資計画は、アフリカのAIインフラ構築に向けた大規模な資金流入を意味します。これにより、今後数年間でデータセンター、ネットワーク機器、AIチップ、クラウドサービスなど、多岐にわたるAI関連製品・サービスの大型契約がアフリカ市場で発生することが予想されます。
- slide: 5
  script: ハーバード大学でサイバー攻撃。ハーバード大学の卒業生、寄付者、一部の学生・教職員のデータベースが、電話フィッシング攻撃によって不正アクセスを受けました。これは、高等教育機関だけでなく、AI/IT業界全体でデータセキュリティへの脅威が依然として高く、強固なサイバーセキュリティ対策が不可欠であることを再認識させる事例です。
- slide: 6
  script: TP-Linkのサプライチェーン課題。中国を起源とするWi-Fi大手TP-Link Systems Inc.が、米国国家安全保障当局に対し中国からの独立性を主張していますが、ベトナム工場の状況がその主張の難しさを示しています。これは、AI関連ハードウェアを含むIT製品のグローバルサプライチェーンにおいて、地政学的な要因と中国依存脱却の複雑な課題が続いていることを示唆します。

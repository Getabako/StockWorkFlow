- slide: 4
  script: グローバルサプライチェーンの再編動向。中国を拠点とするWi-Fi大手TP-Link Systems Inc.が、ベトナムでの製造を強化し米国市場への供給を行うなど、ITハードウェア業界におけるサプライチェーンの地政学的リスク分散の動きが加速していることが示唆されました。これは、AI関連ハードウェアを含む広範なIT製品の供給体制に間接的な影響を与える可能性があります。

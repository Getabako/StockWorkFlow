  script: Hologic、非公開化取引完了に伴い新CEOを任命。医療技術企業のHologicは、183億ドル規模の非公開化取引完了に伴い、前Baxter幹部のJosé
    Almeida氏をCEOに任命しました。（記事37）
- slide: 4
  script: Standard Chartered、暗号資産カストディアンZodiaの部門統合/一部買収を検討。Standard Charteredは、大半を保有する暗号資産カストディアンZodia
    Custody Ltd.の部門統合、または一部買収を検討しています。（記事32）
- slide: 5
  script: Oracleデータセンター向け140億ドルの融資。Pacific Investment Management Co.（Pimco）は、Oracle
    Corp.のミシガン州の巨大データセンター向けに提供する140億ドルの融資の一部売却を検討しています。（記事6, 15）
- slide: 6
  script: Metaデータセンター向け30億ドルの融資。Natixis SA、Mitsubishi UFJ Financial Group Inc.、Societe
    Generale SAを含む銀行団は、Meta Platforms Inc.がオハイオ州に建設するデータセンター向けに30億ドルの融資販売を開始しました。これはAIインフラ構築を支援する最新の大型取引です。（記事17）
- slide: 7
  script: Capella Space、軍事通信衛星デモで4900万ドルの契約獲得。Capella Spaceは、Space Development Agencyから2027年の軍事通信衛星デモンストレーション向けに4900万ドルの契約を獲得しました。（記事48）
